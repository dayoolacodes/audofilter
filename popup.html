<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AudioFilter</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div class="container" style="position:relative;">
      <div id="status" class="status" style="position:absolute;top:4px;right:4px;font-size:11px;"></div>
      <div class="header-row">
        <h1>AudioFilter</h1>
        <label class="switch">
          <input type="checkbox" id="enableFilter">
          <span class="switch-slider"></span>
        </label>
      </div>

      <!-- Live waveform -->
      <div class="wave-box" id="waveBox">
        <canvas id="waveCanvas" width="296" height="60"></canvas>
        <div class="wave-label" id="waveLabel">Inactive</div>
      </div>

      <label class="label">Blocked words (one per line)</label>
      <textarea id="blockedWords" rows="6" placeholder="one\nword\nanother"></textarea>

      <div class="row-pair">
        <div class="field">
          <label class="label">Mute duration (ms)</label>
          <input id="muteDuration" type="number" min="100" step="100" />
        </div>
        <div class="field">
          <label class="label">Pre-mute lead (ms)</label>
          <input id="preMuteLead" type="number" min="0" step="50" />
        </div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioFilter Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      flex-direction: column;
      gap: 20px;
    }

    /* URL input bar */
    .url-bar {
      display: flex;
      gap: 8px;
      width: 100%;
      max-width: 720px;
      padding: 0 16px;
    }
    .url-bar input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a2e;
      color: white;
      font-size: 14px;
      outline: none;
    }
    .url-bar input::placeholder { color: #666; }
    .url-bar input:focus { border-color: #e94560; }
    .url-bar button {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }
    .url-bar button:hover { background: #d63451; }
    .url-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Player container */
    .player {
      position: relative;
      width: 100%;
      max-width: 720px;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
      border-radius: 12px;
    }

    /* YouTube iframe */
    #ytPlayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Canvas scene (for built-in demo) */
    #sceneCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Subtitle area */
    .subtitle {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 6px 18px;
      font-size: 22px;
      border-radius: 4px;
      text-align: center;
      max-width: 85%;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.4;
      z-index: 10;
      pointer-events: none;
    }
    .subtitle.visible { opacity: 1; }

    /* Mute indicator */
    .mute-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(233, 69, 96, 0.95);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      pointer-events: none;
    }
    .mute-indicator.visible { opacity: 1; }

    /* Detection badge */
    .detect-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      color: rgba(255,255,255,0.7);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      z-index: 10;
      display: none;
      pointer-events: none;
    }
    .detect-badge.visible { display: block; }
    .detect-badge .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #4caf50;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* Blocked word highlight */
    .blocked-word {
      color: #e94560;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 20;
      color: white;
      font-size: 16px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: #e94560;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error message */
    .error-msg {
      color: #e94560;
      font-size: 12px;
      text-align: center;
      padding: 0 16px;
      max-width: 720px;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* Built-in demo controls */
    .builtin-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      z-index: 5;
    }
    .play-btn {
      width: 0; height: 0;
      border-style: solid;
      border-width: 7px 0 7px 12px;
      border-color: transparent transparent transparent white;
      cursor: pointer;
    }
    .progress-bar {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }
    .progress-fill {
      height: 100%;
      background: #e94560;
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s linear;
    }
    .time {
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-family: monospace;
    }

    /* Start overlay for built-in demo */
    .start-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
      z-index: 15;
    }
    .start-overlay.hidden { display: none; }
    .start-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .start-btn:hover { background: #d63451; }
    .start-hint {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      text-align: center;
    }

    /* Mode hint below player */
    .mode-hint {
      color: #666;
      font-size: 12px;
      text-align: center;
      max-width: 720px;
      padding: 0 16px;
    }
  </style>
</head>
<body>

  <!-- YouTube URL input -->
  <div class="url-bar">
    <input type="text" id="urlInput" placeholder="Paste any YouTube URL to try it live..." />
    <button id="loadBtn" onclick="loadYouTube()">Load Video</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Player container -->
  <div class="player" id="player">
    <!-- Canvas for built-in demo -->
    <canvas id="sceneCanvas"></canvas>

    <!-- YouTube player target (hidden until YouTube mode) -->

    <!-- Shared overlays -->

    <!-- Start overlay for built-in demo -->
    <div class="start-overlay" id="startOverlay">
      <button class="start-btn" id="startBtn">&#9654; Play Demo</button>
      <div class="start-hint">Built-in sample with audio — or paste a YouTube URL above</div>
    </div>
  </div>

  <div class="mode-hint" id="modeHint">
    Built-in demo uses real WebVTT parsing &amp; profanity detection with audible muting
  </div>

  <!-- YouTube IFrame API -->
  <script>
    // Load YouTube IFrame API asynchronously
    const ytApiReady = new Promise(resolve => {
      window.onYouTubeIframeAPIReady = resolve;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    });
  </script>

<script>
  // =====================================================
  // Configuration
  // =====================================================
  // Set this to your deployed Cloudflare Worker URL
  const WORKER_URL = 'https://audiofilter-captions.YOUR_SUBDOMAIN.workers.dev';

  // =====================================================
  // DOM refs
  // =====================================================
  const subtitleEl = document.getElementById('subtitle');
  const muteIndicator = document.getElementById('muteIndicator');
  const detectBadge = document.getElementById('detectBadge');
  const detectText = document.getElementById('detectText');
  const progressEl = document.getElementById('progress');
  const timerEl = document.getElementById('timer');
  const startOverlay = document.getElementById('startOverlay');
  const loadingOverlay = document.getElementById('loadingOverlay');
  const loadingTextEl = document.getElementById('loadingText');
  const errorMsg = document.getElementById('errorMsg');
  const urlInput = document.getElementById('urlInput');
  const loadBtn = document.getElementById('loadBtn');
  const builtinControls = document.getElementById('builtinControls');
  const modeHint = document.getElementById('modeHint');
  const canvasEl = document.getElementById('sceneCanvas');

  // =====================================================
  // Shared state
  // =====================================================
  let blockedWords = new Set();
  let cues = [];
  let mutePoints = [];
  let mode = 'builtin'; // 'builtin' or 'youtube'

  // =====================================================
  // Real WebVTT parser (same logic as content.js)
  // =====================================================
  function parseWebVTT(text) {
    const result = [];
    const blocks = text.split(/\n\n+/);
    for (const block of blocks) {
      const lines = block.trim().split('\n');
      for (let i = 0; i < lines.length; i++) {
        const timeMatch = lines[i].match(
          /(\d{2}:\d{2}:\d{2}[.,]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[.,]\d{3})/
        );
        if (timeMatch) {
          const startTime = parseVTTTime(timeMatch[1]);
          const endTime = parseVTTTime(timeMatch[2]);
          const content = lines.slice(i + 1).join('\n').trim();
          if (content) {
            result.push({ startTime, endTime, text: content });
          }
          break;
        }
      }
    }
    return result;
  }

  function parseVTTTime(str) {
    const p = str.replace(',', '.').match(/(\d+):(\d+):(\d+)\.(\d+)/);
    if (!p) return 0;
    return (parseInt(p[1]) * 3600 + parseInt(p[2]) * 60 + parseInt(p[3])) * 1000 + parseInt(p[4]);
  }

  // =====================================================
  // Real profanity detection (same logic as content.js)
  // =====================================================
  function findBlockedWordInText(text) {
    const lower = (text || '').toLowerCase().replace(/<[^>]*>/g, '');
    if (!lower) return null;
    let tokens;
    try {
      tokens = lower.match(/\p{L}+/gu) || [];
    } catch (e) {
      tokens = lower.match(/[A-Za-z\u00C0-\u00D6\u00D8-\u00F6\u00F8-\u00FF]+/g) || [];
    }
    if (!tokens.length) return null;
    for (let i = 0; i < tokens.length; i++) {
      if (blockedWords.has(tokens[i])) {
        return { word: tokens[i], index: i, totalWords: tokens.length };
      }
    }
    return null;
  }

  // =====================================================
  // Process cues into mute points (same logic as content.js)
  // =====================================================
  function processCues(parsedCues) {
    const PADDING_MS = 150;
    const points = [];
    for (const cue of parsedCues) {
      const match = findBlockedWordInText(cue.text);
      if (!match) continue;
      const cueDurationMs = cue.endTime - cue.startTime;
      const wordFraction = match.index / match.totalWords;
      const wordDuration = cueDurationMs / match.totalWords;
      const wordStartMs = cue.startTime + (wordFraction * cueDurationMs) - PADDING_MS;
      const muteDuration = wordDuration + PADDING_MS * 2;
      points.push({
        timeMs: Math.max(0, Math.round(wordStartMs)),
        durationMs: Math.round(muteDuration),
        endMs: Math.max(0, Math.round(wordStartMs)) + Math.round(muteDuration),
        word: match.word,
        cue,
      });
    }
    return points;
  }

  // =====================================================
  // Load blocked words
  // =====================================================
  async function loadBlockedWords() {
    const paths = ['../blockedWords.json', './blockedWords.json', '/blockedWords.json'];
    for (const path of paths) {
      try {
        const r = await fetch(path);
        if (r.ok) {
          const words = await r.json();
          blockedWords = new Set(words.map(w => w.trim().toLowerCase()));
          return;
        }
      } catch (e) {}
    }
    // Inline fallback
    blockedWords = new Set([
      'fuck','fucks','fucked','fucker','fuckers','fucking','fuckin',
      'motherfucker','motherfucking',
      'shit','shits','shitter','shitting','shitty','shithead','bullshit','horseshit','dipshit','batshit','apeshit',
      'bitch','bitches','bitching','bitchy',
      'ass','asses','asshole','assholes','asshat','dumbass','jackass',
      'damn','damned','dammit','goddamn','goddamnit',
      'hell','hells','hellish',
      'dick','dicks','dickhead',
      'cock','cocks','cocksucker',
      'pussy','pussies','cunt','cunts',
      'bastard','bastards',
      'piss','pissed','pissing',
      'crap','crappy',
      'whore','whores','slut','sluts',
      'retard','retards','retarded',
      'nigga','niggas','nigger','niggers',
      'fag','fags','faggot','faggots',
    ]);
  }

  // =====================================================
  // Subtitle display helper
  // =====================================================
  function renderSubtitle(text, blockedWord) {
    if (!blockedWord) return text.replace(/\n/g, '<br>');
    const regex = new RegExp(`\\b(${blockedWord})\\b`, 'gi');
    return text.replace(/\n/g, '<br>').replace(regex, '<span class="blocked-word">$1</span>');
  }

  // =====================================================
  // YouTube URL parsing
  // =====================================================
  function extractVideoId(url) {
    if (!url) return null;
    // Handle various YouTube URL formats
    const patterns = [
      /(?:youtube\.com\/watch\?.*v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([\w-]{11})/,
      /^([\w-]{11})$/, // bare video ID
    ];
    for (const pattern of patterns) {
      const match = url.match(pattern);
      if (match) return match[1];
    }
    return null;
  }

  // =====================================================
  // YOUTUBE MODE
  // =====================================================
  let ytPlayer = null;
  let ytPollInterval = null;

  async function loadYouTube() {
    const videoId = extractVideoId(urlInput.value.trim());
    if (!videoId) {
      showError('Invalid YouTube URL. Try pasting a link like https://youtube.com/watch?v=...');
      return;
    }

    hideError();
    mode = 'youtube';

    // Switch UI to YouTube mode
    canvasEl.style.display = 'none';
    builtinControls.style.display = 'none';
    startOverlay.classList.add('hidden');
    document.getElementById('ytPlayer').style.display = 'block';

    // Show loading
    loadingOverlay.classList.remove('hidden');
    loadingTextEl.textContent = 'Fetching captions...';
    loadBtn.disabled = true;

    try {
      // Fetch captions from worker
      const workerUrl = `${WORKER_URL}?v=${videoId}`;
      loadingTextEl.textContent = 'Fetching captions from YouTube...';
      const response = await fetch(workerUrl);
      const data = await response.json();

      if (data.error) {
        throw new Error(data.error);
      }

      // Parse the WebVTT
      loadingTextEl.textContent = 'Parsing subtitles...';
      cues = parseWebVTT(data.webvtt);
      mutePoints = processCues(cues);

      console.log(`AudioFilter: Parsed ${cues.length} cues, found ${mutePoints.length} mute points`);
      mutePoints.forEach(p => {
        console.log(`  Mute "${p.word}" at ${(p.timeMs / 1000).toFixed(1)}s for ${p.durationMs}ms`);
      });

      // Show detection badge
      const langLabel = data.isAutoGenerated ? `${data.languageName} (auto)` : data.languageName;
      detectText.textContent = `${mutePoints.length} mute points — ${langLabel}`;
      detectBadge.classList.add('visible');

      // Set up YouTube player
      loadingTextEl.textContent = 'Loading video...';
      await ytApiReady;

      if (ytPlayer) {
        ytPlayer.destroy();
      }

      ytPlayer = new YT.Player('ytPlayer', {
        videoId: videoId,
        playerVars: {
          autoplay: 1,
          cc_load_policy: 0, // don't show YouTube's own captions
          iv_load_policy: 3, // hide annotations
          modestbranding: 1,
          rel: 0,
        },
        events: {
          onReady: () => {
            loadingOverlay.classList.add('hidden');
            loadBtn.disabled = false;
            modeHint.textContent = `YouTube mode — ${cues.length} subtitle cues loaded, ${mutePoints.length} profanity detections`;
            startYouTubePolling();
          },
          onStateChange: (event) => {
            if (event.data === YT.PlayerState.PLAYING) {
              startYouTubePolling();
            } else {
              stopYouTubePolling();
            }
          },
        },
      });
    } catch (err) {
      loadingOverlay.classList.add('hidden');
      loadBtn.disabled = false;
      showError(err.message || 'Failed to load captions. Make sure the worker is deployed and the video has captions.');
      // Revert to built-in mode
      switchToBuiltin();
    }
  }

  function startYouTubePolling() {
    stopYouTubePolling();
    ytPollInterval = setInterval(youTubeTick, 50); // 50ms for smooth detection
  }

  function stopYouTubePolling() {
    if (ytPollInterval) {
      clearInterval(ytPollInterval);
      ytPollInterval = null;
    }
  }

  function youTubeTick() {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;

    const currentMs = ytPlayer.getCurrentTime() * 1000;

    // Find active subtitle cue
    let activeCue = null;
    for (const cue of cues) {
      if (currentMs >= cue.startTime && currentMs < cue.endTime) {
        activeCue = cue;
        break;
      }
    }

    // Check if in a mute window
    let currentlyMuting = false;
    let currentMuteWord = null;
    for (const mp of mutePoints) {
      if (currentMs >= mp.timeMs && currentMs < mp.endMs) {
        currentlyMuting = true;
        currentMuteWord = mp.word;
        break;
      }
    }

    // Show subtitle
    if (activeCue) {
      subtitleEl.innerHTML = renderSubtitle(activeCue.text, currentlyMuting ? currentMuteWord : null);
      subtitleEl.classList.add('visible');
    } else {
      subtitleEl.classList.remove('visible');
    }

    // Handle muting
    if (currentlyMuting) {
      if (!ytPlayer.isMuted()) ytPlayer.mute();
      muteIndicator.classList.add('visible');
    } else {
      if (ytPlayer.isMuted()) ytPlayer.unMute();
      muteIndicator.classList.remove('visible');
    }
  }

  // =====================================================
  // BUILT-IN DEMO MODE
  // =====================================================
  const BUILTIN_WEBVTT = `WEBVTT

1

presentation by morning.

pulling that shit.

12

I'm starving.

  let builtinStartTime = 0;
  let builtinAnimId = null;
  let builtinPlaying = false;
  let builtinTotalDuration = 65;
  let audioCtx = null;
  let masterGain = null;
  let isMuted = false;
  let particles = [];
  const ctx = canvasEl.getContext('2d');

  function switchToBuiltin() {
    mode = 'builtin';
    canvasEl.style.display = 'block';
    builtinControls.style.display = 'flex';
    document.getElementById('ytPlayer').style.display = 'none';
    startOverlay.classList.remove('hidden');
    modeHint.textContent = 'Built-in demo uses real WebVTT parsing & profanity detection with audible muting';
  }

  function initBuiltinDemo() {
    cues = parseWebVTT(BUILTIN_WEBVTT);
    mutePoints = processCues(cues);
    if (cues.length > 0) {
      builtinTotalDuration = (cues[cues.length - 1].endTime / 1000) + 2;
    }
  }

  // Audio engine
  function initAudio() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.25;
    masterGain.connect(audioCtx.destination);

    const notes = [
      { freq: 130.81, type: 'sine', gain: 0.12 },
      { freq: 164.81, type: 'sine', gain: 0.09 },
      { freq: 196.00, type: 'sine', gain: 0.09 },
      { freq: 261.63, type: 'sine', gain: 0.07 },
      { freq: 329.63, type: 'triangle', gain: 0.04 },
    ];

    notes.forEach(n => {
      const osc = audioCtx.createOscillator();
      osc.type = n.type;
      osc.frequency.value = n.freq;
      osc.detune.value = (Math.random() - 0.5) * 8;

      const gain = audioCtx.createGain();
      gain.gain.value = n.gain;

      const lfo = audioCtx.createOscillator();
      const lfoGain = audioCtx.createGain();
      lfo.frequency.value = 0.15 + Math.random() * 0.2;
      lfoGain.gain.value = n.gain * 0.3;
      lfo.connect(lfoGain);
      lfoGain.connect(gain.gain);
      lfo.start();

      osc.connect(gain);
      gain.connect(masterGain);
      osc.start();
    });

    // Subtle pulse
    function pulseLoop() {
      if (!audioCtx || audioCtx.state === 'closed') return;
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = 60;
      const env = audioCtx.createGain();
      env.gain.value = 0;
      env.gain.setValueAtTime(0.06, audioCtx.currentTime);
      env.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.connect(env);
      env.connect(masterGain);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
      setTimeout(pulseLoop, 2000);
    }
    setTimeout(pulseLoop, 1000);
  }

  function muteAudio() {
    if (!masterGain || isMuted) return;
    isMuted = true;
    masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
  }

  function unmuteAudio() {
    if (!masterGain || !isMuted) return;
    isMuted = false;
    masterGain.gain.setTargetAtTime(0.25, audioCtx.currentTime, 0.02);
  }

  // Canvas
  function resizeCanvas() {
    const player = document.getElementById('player');
    canvasEl.width = player.clientWidth;
    canvasEl.height = player.clientHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  function initParticles() {
    particles = [];
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvasEl.width,
        y: Math.random() * canvasEl.height,
        vx: (Math.random() - 0.5) * 0.3,
        vy: (Math.random() - 0.5) * 0.2,
        r: Math.random() * 2 + 0.5,
        alpha: Math.random() * 0.3 + 0.1,
      });
    }
  }
  initParticles();

  function drawScene(elapsed) {
    const w = canvasEl.width, h = canvasEl.height;
    const hue = 220 + Math.sin(elapsed * 0.1) * 15;
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, `hsl(${hue}, 40%, 10%)`);
    grad.addColorStop(0.5, `hsl(${hue + 20}, 35%, 14%)`);
    grad.addColorStop(1, `hsl(${hue + 40}, 45%, 18%)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);

    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
      ctx.fill();
    }

    const vignette = ctx.createRadialGradient(w/2, h/2, h*0.3, w/2, h/2, h*0.8);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.4)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, w, h);
  }

  function startBuiltinDemo() {
    startOverlay.classList.add('hidden');
    initAudio();
    builtinStartTime = Date.now();
    builtinPlaying = true;
    detectText.textContent = `${mutePoints.length} mute points detected`;
    detectBadge.classList.add('visible');
    builtinTick();
  }

  function builtinTick() {
    if (!builtinPlaying) return;

    const elapsed = (Date.now() - builtinStartTime) / 1000;
    const elapsedMs = elapsed * 1000;
    const pct = Math.min(100, (elapsed / builtinTotalDuration) * 100);
    progressEl.style.width = pct + '%';

    const mins = Math.floor(elapsed / 60);
    const secs = Math.floor(elapsed % 60);
    const totalMins = Math.floor(builtinTotalDuration / 60);
    const totalSecs = Math.floor(builtinTotalDuration % 60);
    timerEl.textContent = `${mins}:${secs.toString().padStart(2, '0')} / ${totalMins}:${totalSecs.toString().padStart(2, '0')}`;

    // Find active cue
    let activeCue = null;
    for (const cue of cues) {
      if (elapsedMs >= cue.startTime && elapsedMs < cue.endTime) {
        activeCue = cue;
        break;
      }
    }

    // Check mute window
    let currentlyMuting = false;
    let currentMuteWord = null;
    for (const mp of mutePoints) {
      if (elapsedMs >= mp.timeMs && elapsedMs < mp.endMs) {
        currentlyMuting = true;
        currentMuteWord = mp.word;
        break;
      }
    }

    // Subtitle
    if (activeCue) {
      subtitleEl.innerHTML = renderSubtitle(activeCue.text, currentlyMuting ? currentMuteWord : null);
      subtitleEl.classList.add('visible');
    } else {
      subtitleEl.classList.remove('visible');
    }

    // Muting
    if (currentlyMuting) {
      muteAudio();
      muteIndicator.classList.add('visible');
    } else {
      unmuteAudio();
      muteIndicator.classList.remove('visible');
    }

    // Canvas
    drawScene(elapsed);

    if (elapsed < builtinTotalDuration) {
      builtinAnimId = requestAnimationFrame(builtinTick);
    } else {
      builtinPlaying = false;
      subtitleEl.classList.remove('visible');
      muteIndicator.classList.remove('visible');
      detectBadge.classList.remove('visible');
      unmuteAudio();
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      startOverlay.classList.remove('hidden');
    }
  }

  // =====================================================
  // Error handling
  // =====================================================
  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
  }

  function hideError() {
    errorMsg.classList.remove('visible');
  }

  // =====================================================
  // Event listeners
  // =====================================================
  document.getElementById('startBtn').addEventListener('click', startBuiltinDemo);

  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadYouTube();
  });

  // =====================================================
  // Init
  // =====================================================
  async function init() {
    await loadBlockedWords();
    initBuiltinDemo();
    console.log(`AudioFilter Demo: ${cues.length} cues, ${mutePoints.length} mute points ready`);
  }
  init();
</script>

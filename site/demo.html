<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioFilter Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      flex-direction: column;
      gap: 16px;
    }

    /* Player container */
    .player {
      position: relative;
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
      border-radius: 12px;
    }

    /* YouTube iframe fills player */
    #ytPlayer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Subtitle overlay */
    .subtitle {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 6px 18px;
      font-size: 22px;
      border-radius: 4px;
      text-align: center;
      max-width: 85%;
      opacity: 0;
      transition: opacity 0.15s;
      line-height: 1.4;
      z-index: 10;
      pointer-events: none;
    }
    .subtitle.visible { opacity: 1; }

    /* Mute indicator */
    .mute-indicator {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(233, 69, 96, 0.95);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 10;
      pointer-events: none;
    }
    .mute-indicator.visible { opacity: 1; }

    /* Detection badge */
    .detect-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.7);
      color: rgba(255,255,255,0.7);
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      z-index: 10;
      display: none;
      pointer-events: none;
    }
    .detect-badge.visible { display: block; }
    .detect-badge .dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #4caf50;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }

    /* Blocked word highlight */
    .blocked-word {
      color: #e94560;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    /* Status bar below player */
    .status {
      color: #555;
      font-size: 12px;
      text-align: center;
      max-width: 800px;
      padding: 0 16px;
    }

    /* Error */
    .error-msg {
      color: #e94560;
      font-size: 13px;
      text-align: center;
      max-width: 800px;
      padding: 0 16px;
      display: none;
    }
    .error-msg.visible { display: block; }
  </style>
</head>
<body>

  <div class="player" id="player">
    <div id="ytPlayer"></div>

    <div class="detect-badge" id="detectBadge">
      <span class="dot"></span><span id="detectText"></span>
    </div>
    <div class="subtitle" id="subtitle"></div>
    <div class="mute-indicator" id="muteIndicator">&#128263; AudioFilter — Muted</div>
  </div>

  <div class="status" id="status">Loading...</div>
  <div class="error-msg" id="errorMsg"></div>

  <!-- YouTube IFrame API -->
  <script>
    const ytApiReady = new Promise(resolve => {
      window.onYouTubeIframeAPIReady = resolve;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
    });
  </script>

<script>
  // =====================================================
  // Configuration — change VIDEO_ID to use a different video
  // =====================================================
  const VIDEO_ID = 'rzuTQZqGp8w';
  const CAPTIONS_FILE = 'demo-video.en.vtt';

  // =====================================================
  // DOM refs
  // =====================================================
  const subtitleEl = document.getElementById('subtitle');
  const muteIndicator = document.getElementById('muteIndicator');
  const detectBadge = document.getElementById('detectBadge');
  const detectText = document.getElementById('detectText');
  const statusEl = document.getElementById('status');
  const errorMsg = document.getElementById('errorMsg');

  // =====================================================
  // State
  // =====================================================
  let blockedWords = new Set();
  let cues = [];
  let mutePoints = [];
  let ytPlayer = null;
  let pollInterval = null;

  // =====================================================
  // WebVTT parser (same logic as content.js)
  // =====================================================
  function parseWebVTT(text) {
    const result = [];
    const blocks = text.split(/\n\n+/);
    for (const block of blocks) {
      const lines = block.trim().split('\n');
      for (let i = 0; i < lines.length; i++) {
        const timeMatch = lines[i].match(
          /(\d{2}:\d{2}:\d{2}[.,]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[.,]\d{3})/
        );
        if (timeMatch) {
          const startTime = parseVTTTime(timeMatch[1]);
          const endTime = parseVTTTime(timeMatch[2]);
          const content = lines.slice(i + 1).join('\n')
            .replace(/<[^>]*>/g, '') // strip VTT tags like <c>, </c>
            .trim();
          if (content) {
            result.push({ startTime, endTime, text: content });
          }
          break;
        }
      }
    }
    return result;
  }

  function parseVTTTime(str) {
    const p = str.replace(',', '.').match(/(\d+):(\d+):(\d+)\.(\d+)/);
    if (!p) return 0;
    return (parseInt(p[1]) * 3600 + parseInt(p[2]) * 60 + parseInt(p[3])) * 1000 + parseInt(p[4]);
  }

  // =====================================================
  // Profanity detection (same logic as content.js)
  // =====================================================
  function findBlockedWordInText(text) {
    const lower = (text || '').toLowerCase().replace(/<[^>]*>/g, '');
    if (!lower) return null;
    let tokens;
    try {
      tokens = lower.match(/\p{L}+/gu) || [];
    } catch (e) {
      tokens = lower.match(/[A-Za-z\u00C0-\u00D6\u00D8-\u00F6\u00F8-\u00FF]+/g) || [];
    }
    if (!tokens.length) return null;
    for (let i = 0; i < tokens.length; i++) {
      if (blockedWords.has(tokens[i])) {
        return { word: tokens[i], index: i, totalWords: tokens.length };
      }
    }
    return null;
  }

  // =====================================================
  // Mute point computation (same logic as content.js)
  // =====================================================
  function processCues(parsedCues) {
    const PADDING_MS = 150;
    const points = [];
    for (const cue of parsedCues) {
      const match = findBlockedWordInText(cue.text);
      if (!match) continue;
      const cueDurationMs = cue.endTime - cue.startTime;
      const wordFraction = match.index / match.totalWords;
      const wordDuration = cueDurationMs / match.totalWords;
      const wordStartMs = cue.startTime + (wordFraction * cueDurationMs) - PADDING_MS;
      const muteDuration = wordDuration + PADDING_MS * 2;
      points.push({
        timeMs: Math.max(0, Math.round(wordStartMs)),
        endMs: Math.max(0, Math.round(wordStartMs)) + Math.round(muteDuration),
        word: match.word,
        cue,
      });
    }
    return points;
  }

  // =====================================================
  // Load blocked words
  // =====================================================
  async function loadBlockedWords() {
    const paths = ['../blockedWords.json', './blockedWords.json', '/blockedWords.json'];
    for (const path of paths) {
      try {
        const r = await fetch(path);
        if (r.ok) {
          const words = await r.json();
          blockedWords = new Set(words.map(w => w.trim().toLowerCase()));
          return;
        }
      } catch (e) {}
    }
    // Inline fallback
    blockedWords = new Set([
      'fuck','fucks','fucked','fucker','fuckers','fucking','fuckin',
      'motherfucker','motherfucking',
      'shit','shits','shitter','shitting','shitty','shithead','bullshit','horseshit','dipshit','batshit','apeshit',
      'bitch','bitches','bitching','bitchy',
      'ass','asses','asshole','assholes','asshat','dumbass','jackass',
      'damn','damned','dammit','goddamn','goddamnit',
      'hell','hells','hellish',
      'dick','dicks','dickhead',
      'cock','cocks','cocksucker',
      'pussy','pussies','cunt','cunts',
      'bastard','bastards',
      'piss','pissed','pissing',
      'crap','crappy',
      'whore','whores','slut','sluts',
      'retard','retards','retarded',
      'nigga','niggas','nigger','niggers',
      'fag','fags','faggot','faggots',
    ]);
  }

  // =====================================================
  // Subtitle rendering
  // =====================================================
  function renderSubtitle(text, blockedWord) {
    if (!blockedWord) return text.replace(/\n/g, '<br>');
    const regex = new RegExp(`\\b(${blockedWord})\\b`, 'gi');
    return text.replace(/\n/g, '<br>').replace(regex, '<span class="blocked-word">$1</span>');
  }

  // =====================================================
  // Playback polling — sync subtitles & muting to video
  // =====================================================
  function startPolling() {
    stopPolling();
    pollInterval = setInterval(tick, 50);
  }

  function stopPolling() {
    if (pollInterval) {
      clearInterval(pollInterval);
      pollInterval = null;
    }
  }

  function tick() {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const currentMs = ytPlayer.getCurrentTime() * 1000;

    // Find active cue
    let activeCue = null;
    for (const cue of cues) {
      if (currentMs >= cue.startTime && currentMs < cue.endTime) {
        activeCue = cue;
        break;
      }
    }

    // Check if in a mute window
    let muting = false;
    let muteWord = null;
    for (const mp of mutePoints) {
      if (currentMs >= mp.timeMs && currentMs < mp.endMs) {
        muting = true;
        muteWord = mp.word;
        break;
      }
    }

    // Show subtitle
    if (activeCue) {
      subtitleEl.innerHTML = renderSubtitle(activeCue.text, muting ? muteWord : null);
      subtitleEl.classList.add('visible');
    } else {
      subtitleEl.classList.remove('visible');
    }

    // Handle muting
    if (muting) {
      if (!ytPlayer.isMuted()) ytPlayer.mute();
      muteIndicator.classList.add('visible');
    } else {
      if (ytPlayer.isMuted()) ytPlayer.unMute();
      muteIndicator.classList.remove('visible');
    }
  }

  // =====================================================
  // Init
  // =====================================================
  async function init() {
    statusEl.textContent = 'Loading blocked words...';
    await loadBlockedWords();

    // Load pre-fetched VTT captions
    statusEl.textContent = 'Loading captions...';
    try {
      const vttResponse = await fetch(CAPTIONS_FILE);
      if (!vttResponse.ok) throw new Error(`Could not load ${CAPTIONS_FILE}`);
      const vttText = await vttResponse.text();

      cues = parseWebVTT(vttText);
      mutePoints = processCues(cues);

      console.log(`AudioFilter Demo: ${cues.length} cues, ${mutePoints.length} mute points`);
      mutePoints.forEach(p => {
        console.log(`  Mute "${p.word}" at ${(p.timeMs / 1000).toFixed(1)}s`);
      });

      detectText.textContent = `${cues.length} cues parsed — ${mutePoints.length} mute points`;
      detectBadge.classList.add('visible');
    } catch (err) {
      errorMsg.textContent = `Caption load failed: ${err.message}. Run ./fetch-captions.sh to download captions.`;
      errorMsg.classList.add('visible');
      statusEl.textContent = 'Captions not available — video will play without filtering';
    }

    // Set up YouTube player
    statusEl.textContent = 'Loading YouTube player...';
    await ytApiReady;

    ytPlayer = new YT.Player('ytPlayer', {
      videoId: VIDEO_ID,
      playerVars: {
        autoplay: 0,
        cc_load_policy: 0,
        iv_load_policy: 3,
        modestbranding: 1,
        rel: 0,
      },
      events: {
        onReady: () => {
          statusEl.textContent = mutePoints.length > 0
            ? `Ready — ${mutePoints.length} profanity mute points detected. Press play.`
            : 'Ready — press play.';
        },
        onStateChange: (event) => {
          if (event.data === YT.PlayerState.PLAYING) {
            startPolling();
            statusEl.textContent = `Playing — ${mutePoints.length} mute points active`;
          } else {
            stopPolling();
          }
        },
      },
    });
  }

  init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioFilter — Profanity Filter for Video Subtitles</title>
  <meta name="description" content="Free Chrome extension that automatically mutes audio when profanity appears in video subtitles. Works on Netflix, Prime Video, Disney+, and more.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f0e8;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: white;
      border-bottom: 1px solid #e8e3da;
    }
    .nav-logo {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      color: #1a1a1a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-logo span { color: #e94560; }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
    }
    .nav-links a {
      color: #1a1a1a;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .nav-links a:hover { color: #e94560; }
    .nav-cta {
      background: #1a1a1a;
      color: white !important;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600 !important;
      transition: background 0.2s;
    }
    .nav-cta:hover { background: #333 !important; color: white !important; }

    /* Hero */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 24px;
    }
    .hero h1 {
      font-family: 'Lato', sans-serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 24px;
      max-width: 800px;
    }
    .hero h1 strong { font-weight: 700; color: #1a1a1a; }
    .hero h1 em { font-style: italic; color: #b8a99a; }
    .hero p {
      font-size: 1.1rem;
      color: #666;
      max-width: 580px;
      margin-bottom: 40px;
      line-height: 1.7;
    }
    .platforms {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-bottom: 36px;
    }
    .platforms img, .platforms svg {
      height: 45px;
      width: auto;
      object-fit: contain;
    }
    .more-badge {
      font-size: 0.85rem;
      color: #999;
      font-weight: 500;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      color: white;
      padding: 16px 36px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .hero-sub {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #999;
    }

    /* Bottom marquee */
    .marquee-wrap {
      position: relative;
      overflow: hidden;
      white-space: nowrap;
      padding: 16px 0;
    }

    /* Two layers: unfiltered (left) and filtered (right) */
    .marquee-layer {
      white-space: nowrap;
      font-family: 'Lato', sans-serif;
      font-size: 1.5rem;
      font-weight: 300;
    }
    .marquee-layer .track {
      display: inline-block;
      animation: marquee 80s linear infinite;
    }

    /* Left half: unfiltered — profane words shown in red, no strikethrough */
    .marquee-left {
      clip-path: inset(0 50% 0 0);
      color: rgba(0,0,0,0.85);
      font-weight: 700;
    }
    .marquee-left .profane {
      color: #e94560;
      text-decoration: line-through;
      text-decoration-thickness: 2px;
    }

    /* Right half: unfiltered — profane words shown in red, no strikethrough */
    .marquee-right {
      position: absolute;
      top: 16px;
      left: 0;
      right: 0;
      clip-path: inset(0 0 0 50%);
      color: rgba(0,0,0,0.25);
    }
    .marquee-right .profane {
      color: #e94560;
    }

    /* Center SVG waveform */
    .wave-divider {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      background: #f5f0e8;
      padding: 4px 12px;
      border-radius: 10px;
    }

    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    footer {
      padding: 12px 48px;
      font-size: 0.8rem;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer a { color: #999; text-decoration: none; }
    footer a:hover { color: #e94560; }

    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { gap: 16px; }
      .hero h1 { font-size: 2.5rem; }
      .hero p { font-size: 0.95rem; margin-bottom: 28px; }
      .platforms { gap: 16px; margin-bottom: 28px; }
      .platforms img, .platforms svg { height: 45px; }
      .more-badge { font-size: 0.75rem; }
      .hero-cta { padding: 14px 28px; font-size: 0.9rem; }
      .marquee-layer { font-size: 1rem; }
      footer { padding: 12px 20px; }
    }
    @media (max-width: 480px) {
      .hero h1 { font-size: 2rem; }
      .hero p { font-size: 0.85rem; }
      .platforms { flex-direction: row; flex-wrap: wrap; gap: 20px; }
      .platforms img, .platforms svg { height: 45px; }
      .marquee-layer { font-size: 0.85rem; }
    }
  </style>
</head>

<script>
  const text = [
    "I told him the timeline should be ready by Friday, although the team thought it was ",
    {w:"bullshit"}, " and honestly I can't ", {w:"fucking"},
    " blame them because there's been a lot of back and forth and the whole ",
    {w:"damn"}, " thing has been a mess since day one, so I said get your ",
    {w:"shit"}, " together and figure it out before Monday or we're all screwed, and she just looked at me like what the ",
    {w:"hell"}, " are you talking about, and I told her the project is falling apart and if we don't stop ",
    {w:"bitching"}, " about it and actually do something then this whole quarter is a ",
    {w:"crap"}, " shoot and nobody wants to explain that to the board",
  ];

  function build(filtered) {
    let h = '';
    for (let r = 0; r < 2; r++) {
      for (const part of text) {
        if (typeof part === 'string') {
          h += part;
        } else if (filtered) {
          const w = part.w;
          h += '<span class="profane">' + w[0] + '*'.repeat(w.length - 2) + w[w.length - 1] + '</span>';
        } else {
          h += '<span class="profane">' + part.w + '</span>';
        }
      }
      h += ' &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; ';
    }
    return '<div class="track">' + h + '</div>';
  }

  document.getElementById('leftLayer').innerHTML = build(true);
  document.getElementById('rightLayer').innerHTML = build(false);
</script>
